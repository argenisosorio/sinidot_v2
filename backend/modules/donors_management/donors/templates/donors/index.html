<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donors List</title>
</head>
<body>
    <main>
        <h1>Donors List</h1>
        <a href="{% url 'donors:create' %}">Add New Donor</a>
        
        <table border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Age</th>
                    <th aria-label="Actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for donor in donors %}
                <tr>
                    <td>{{ donor.name }}</td>
                    <td>{{ donor.email }}</td>
                    <td>{{ donor.age }}</td>
                    <td>
                        <a href="{% url 'donors:edit' donor.id %}">Edit</a> |
                        <form action="{% url 'donors:delete' donor.id %}" method="POST" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" onclick="return confirm('Are you sure?')">Delete</button>
                        </form>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5">No donors found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>
</html>
