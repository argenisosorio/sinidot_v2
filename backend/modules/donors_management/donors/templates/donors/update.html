<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Donor</title>
</head>
<body>
    <main>
        <h1>Update Donor: {{ donor.name }}</h1>
        
        <form action="{% url 'donors:update' donor.id %}" method="POST">
            {% csrf_token %}

            <div>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" value="{{ donor.name }}">
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="text" id="email" name="email" value="{{ donor.email }}">
            </div>
            <div>
                <label for="age">Age:</label>
                <input type="text" id="age" name="age" value="{{ donor.age }}">
            </div>
            <button type="submit">Update Donor</button>
            <a href="{% url 'donors:index' %}">Cancel</a>
        </form>
    </main>
</body>
</html>
