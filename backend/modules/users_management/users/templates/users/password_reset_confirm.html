<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña</title>
</head>
<body>
    <header>
        <h1>Crea tu nueva contraseña</h1>
    </header>
    <main>
        {% if validlink %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Guardar nueva contraseña</button>
            </form>
        {% else %}
            <p role="alert">El enlace de recuperación no es válido o ya ha caducado.</p>
            <a href="{% url 'password_reset' %}">Solicitar un nuevo enlace</a>
        {% endif %}
    </main>
</body>
</html>
