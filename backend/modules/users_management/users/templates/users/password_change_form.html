<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cambiar Contraseña</title>
</head>
<body>
    <header>
        <h1>Cambiar mi contraseña actual</h1>
    </header>
    <main>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Actualizar contraseña</button>
            <a href="{% url 'users:user_list' %}">Cancelar</a>
        </form>
    </main>
</body>
</html>
